<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My S3 Static Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #232f3e;
            color: white;
            padding: 20px;
        }
        main {
            padding: 40px;
        }
        footer {
            background-color: #232f3e;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My S3 Website Versioning Task 🚀</h1>
    </header>

    <main>
        <h2>Static Website Hosted on Amazon S3</h2>
        <p>This is a sample HTML page uploaded to an S3 bucket.</p>
        <p>You can modify this content and build your own static website.</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </main>

    <footer>
        <p>© 2026 My Website | Hosted on AWS S3</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = "Hello! Your S3 site is working correctly 🎉";
        }
    </script>

</body>
</html>
